name: Deploy to GitHub Pages

# SplitClone is a client-only static SPA (SC-ARC-HST-1). This publishes the
# adapter-static build (app) plus the StrictDoc SRS to a GitHub Pages
# *project* site:
#   app  https://stefanberlin.github.io/splitclone/
#   SRS  https://stefanberlin.github.io/splitclone/srs/
# (paths.base = '/splitclone' is set in svelte.config.js — see project
# memory: deploy target.)
#
# There is no build job here. The reusable gate (gate.yml — the SAME bar
# every PR clears via ci.yml) does the build itself and, because we pass
# publish: true, also assembles and uploads the Pages artifact in that one
# run. So a single checkout/install/build serves both "is it good?" and
# "ship it" — no duplicated compute — and deploy still only runs if the
# gate is green.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to Pages; no write access to repo contents.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress run finish (don't cancel
# a publish midway).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Identical bar to every PR — ci.yml calls this same reusable workflow.
  # publish:true makes this run also upload the Pages artifact to deploy.
  gate:
    uses: ./.github/workflows/gate.yml
    with:
      publish: true

  deploy:
    needs: gate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
