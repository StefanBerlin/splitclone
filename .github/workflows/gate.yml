name: Gate

# Single source of truth for "is this tree deployable?": format, lint,
# typecheck, unit tests, a production build, and the StrictDoc SRS build.
# Called (never run directly) by both ci.yml (every PR, before merge) and
# deploy.yml (on main). One reusable workflow means the bar a PR clears is
# exactly the bar main is held to — they cannot drift, so a green PR cannot
# produce a red post-merge deploy.
#
# When called with `publish: true` (deploy.yml only) this same job ALSO
# assembles and uploads the Pages artifact, so deploy.yml needs no second
# checkout/install/build job — the deploy is published straight from this
# run. PRs call it without `publish`, so they pay nothing for that.

on:
  workflow_call:
    inputs:
      publish:
        description: >-
          Also stage the SPA 404 fallback + SRS and upload the Pages
          artifact for a downstream deploy job. deploy.yml passes true;
          PRs leave it false.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node BEFORE pnpm: pnpm 11's installer needs Node >=22.13, so it
      # cannot run on the runner's default Node. pnpm itself is provisioned
      # by Corepack from the pinned "packageManager" field in package.json
      # (same mechanism used locally) — no pnpm/action-setup.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack (pnpm pinned in package.json)
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate

      - name: Resolve pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Same bar as local (format/lint/typecheck/unit) plus a real build.
      # e2e (Playwright) is intentionally excluded — heavier, not part of
      # the smoke gate.
      - name: Lint & format check
        run: pnpm lint

      - name: Typecheck
        run: pnpm check

      - name: Unit tests
        run: pnpm test:unit -- --run

      # Build here: a tree that lints/typechecks can still fail the
      # adapter-static build. This is the step that makes "deploy never
      # fails after merge" actually true.
      - name: Build
        env:
          # PKCE SPA client id — not a secret. Set as a repo Variable:
          # Settings > Secrets and variables > Actions > Variables.
          # If unset, the build still succeeds (auth/config.ts tolerates a
          # missing id); OneDrive sign-in just won't work on the live site.
          PUBLIC_MS_CLIENT_ID: ${{ vars.PUBLIC_MS_CLIENT_ID }}
        run: pnpm build

      # SRS (StrictDoc) is published alongside the app. Building it on every
      # PR means a malformed requirements.sdoc fails the PR, not the
      # post-merge deploy.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install StrictDoc (pinned)
        run: pip install -r docs/strictdoc-requirements.txt

      - name: Build SRS (validates requirements.sdoc)
        run: pnpm docs:srs

      # --- Publish-only: assemble + upload the Pages artifact. -----------
      # Skipped on PRs (publish=false), so PRs do zero artifact work.

      # GitHub Pages serves 404.html for any path it can't resolve to a
      # file; publishing the SPA shell there boots the app on deep links /
      # hard refreshes instead of Pages' generic 404. Root still serves
      # index.html (HTTP 200); only unknown paths use 404.html.
      - name: SPA fallback for GitHub Pages deep links
        if: ${{ inputs.publish }}
        run: cp build/index.html build/404.html

      # Real files under build/ are served by Pages directly, ahead of the
      # SPA 404 fallback, and there is no /srs app route — no collision.
      - name: Stage SRS into the Pages tree (/splitclone/srs/)
        if: ${{ inputs.publish }}
        run: |
          mkdir -p build/srs
          cp -r docs/_build/html/. build/srs/

      - name: Upload Pages artifact
        if: ${{ inputs.publish }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: build
